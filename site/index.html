<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کدیار 24</title>
    <script>
      // Session user ID cookie-to-localStorage sync
      var c = document.cookie.split(";").find(function(x){return x.trim().startsWith("session_user_id=")});
      if (c) { localStorage.setItem("session_user_id", c.trim().split("=")[1]); }

      // Defensive browser polyfills for headless/iframe environments
      if (typeof window !== 'undefined') {
        // matchMedia polyfill
        if (!window.matchMedia) {
          window.matchMedia = function() {
            return {
              matches: false,
              media: '',
              onchange: null,
              addListener: function() {},
              removeListener: function() {},
              addEventListener: function() {},
              removeEventListener: function() {},
              dispatchEvent: function() { return false; }
            };
          };
        } else {
          var originalMatchMedia = window.matchMedia;
          window.matchMedia = function(query) {
            var res = originalMatchMedia(query);
            if (res) {
              if (typeof res.addListener !== 'function') res.addListener = function() {};
              if (typeof res.removeListener !== 'function') res.removeListener = function() {};
              if (typeof res.addEventListener !== 'function') res.addEventListener = function() {};
              if (typeof res.removeEventListener !== 'function') res.removeEventListener = function() {};
            }
            return res;
          };
        }

        // process polyfill to prevent undefined process.on/emit/addListener errors
        if (typeof window.process === 'undefined') {
          window.process = {
            env: {},
            argv: [],
            platform: 'browser',
            on: function() {},
            addListener: function() {},
            removeListener: function() {},
            emit: function() {},
            once: function() {},
            off: function() {}
          };
        } else {
          if (typeof window.process.on !== 'function') window.process.on = function() {};
          if (typeof window.process.addListener !== 'function') window.process.addListener = function() {};
          if (typeof window.process.removeListener !== 'function') window.process.removeListener = function() {};
          if (typeof window.process.emit !== 'function') window.process.emit = function() {};
          if (typeof window.process.once !== 'function') window.process.once = function() {};
          if (typeof window.process.off !== 'function') window.process.off = function() {};
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
